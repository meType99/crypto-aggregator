services:
  - type: web
    name: finrate
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: UPDATE_INTERVAL
        value: 300
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.12.8
